# Permalinks
permalink: /blog/:year/:month/:day/:title/
relative_permalinks: false
encoding: utf-8

# Setup
title:               Michael's Data Story
#tagline:             'foo's website
description:         Michael's Personal Blog
url: https://michaelhur.github.io
#baseurl: "/"
#urlimg: https://dyndna.github.io/lanyon-plus/images/
#markdown: kramdown
markdown: redcarpet
highlighter: rouge
paginate: 5
paginate_path: "/blog/page:num"
excerpt_separator: <!--more-->
#default_bg: sitebg.jpg
#default_logo: sitelogo.png
safe: false
#timezone:    America/Chicago
future:      true


## code highlight options
# syntax_highlighter: rouge
# input: GFM

gems:
  - jekyll-paginate
  - jemoji
  - font-awesome-sass
  - kramdown
  - rouge
  - jekyll-mentions

jekyll-mentions:
  base_url: https://twitter.com

include: [".htaccess"]
exclude: ["lib", "config.rb", "Gemfile", "Capfile", "Gemfile.lock", "config", "log", "Rakefile", "Rakefile.rb", "rakefile", "README.md", "tmp", "less", "*.sublime-project", "*.sublime-workspace", "test", "spec", "Gruntfile.js", "package.json", "node_modules", "LICENSE", "vendor", "assets", "_plugins", "public/dormant"]

# About/contact
author:
  name:              Michael Hur
  url:               https://michaelhur.github.io/
  #avatar:         foo.png
  email:           jhhur@uwaterloo.ca

